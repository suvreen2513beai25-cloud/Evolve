<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Habits - Habit Tracker</title>
  <link rel="stylesheet" href="../style.css"/>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo">
      <h2>📊 Habit Tracker</h2>
    </div>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="habits.html" class="active">Habits</a>
      <a href="stats.html">Stats</a>
    </div>
  </div>
</nav>

<main class="container">
  <section class="welcome">
    <h1>Manage Habits</h1>
    <p>Add, track, and complete your habits daily.</p>
  </section>

  <!-- INPUT -->
  <section class="add-box">
    <input
      type="text"
      id="habitInput"
      placeholder="Enter a new habit (e.g., Read 10 pages)..."
      maxlength="50"
    />
    <button onclick="addHabit()" class="btn primary">
      Add Habit
    </button>
  </section>

  <!-- HABITS GRID -->
  <section id="habitsGrid" class="habits-grid">
  
    <!-- Generated dynamically via JS -->
  </section>
  <div class="filter-box" style="margin-bottom: 20px; text-align: right;">
  <label for="sortSelector" style="color: #94a3b8; font-weight: 600; margin-right: 10px;">Sort Habits By:</label>
  <select id="sortSelector" onchange="sortHabits(this.value)" style="padding: 8px 12px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid rgba(255,255,255,0.2); outline: none; cursor: pointer;">
    <option value="default">Date Created</option>
    <option value="streak">🔥 Highest Streak</option>
    <option value="name">🔤 Alphabetical (A-Z)</option>
  </select>
</div>
</main>
<script src="script.js"></script>
<script src="habits.js"></script>
</body>
</html>
</body>
</html>

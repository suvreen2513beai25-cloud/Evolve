<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker - Habits</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>📊 Habit Tracker</h2>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Dashboard</a>
                <a href="habits.html" class="nav-link active">Habits</a>
                <a href="stats.html" class="nav-link">Stats</a>
            </div>
        </div>
    </nav>

    <main class="habits-page">
        <div class="container">
            <div class="page-header">
                <h1>Manage Habits</h1>
                <p>Track your daily progress</p>
            </div>

            <div class="add-habit-section">
                <div class="add-habit">
                    <input type="text" id="habitInput" placeholder="Enter new habit (e.g., Meditate 10min)" maxlength="50">
                    <button class="add-btn" onclick="addHabit()">Add Habit</button>
                </div>
            </div>

            <div class="habits-grid" id="habitsGrid">
                <div class="empty-state">
                    <h3>No habits yet</h3>
                    <p>Add your first habit to start tracking!</p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            renderHabits();
        });
    </script>
</body>
</html>

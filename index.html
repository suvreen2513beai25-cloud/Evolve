<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>📊 Habit Tracker</h2>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Dashboard</a>
                <a href="habits.html" class="nav-link">Habits</a>
                <a href="stats.html" class="nav-link">Stats</a>
            </div>
        </div>
    </nav>

    <main class="dashboard">
        <div class="container">
            <div class="welcome-section">
                <h1>Welcome back!</h1>
                <p>Keep building those habits 🚀</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-number" id="totalHabits">0</div>
                    <div class="stat-label">Total Habits</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-number" id="bestStreak">0</div>
                    <div class="stat-label">Best Streak</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-number" id="totalDays">0</div>
                    <div class="stat-label">Days Tracked</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-number" id="completionRate">0%</div>
                    <div class="stat-label">Completion Rate</div>
                </div>
            </div>

            <div class="quick-actions">
                <a href="habits.html" class="action-btn primary">Manage Habits</a>
                <a href="stats.html" class="action-btn secondary">View Detailed Stats</a>
            </div>

            <div class="recent-habits">
                <h3>Today's Habits</h3>
                <div id="todayHabits"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            updateDashboardStats();
            showTodayHabits();
        });
        <button onclick="exportData()">📤 Export Data</button>
        
    </script>
</body>
</html>
